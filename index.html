<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#ff8f70">
    <meta
      name="description"
      content="不知道今天吃什么？轻轻一点，随机挑选你的下一顿美食。"
    >
    <title>今天吃什么？</title>
    <link rel="stylesheet" href="css/style.css">
  </head>
  <body>
    <div class="background-shape shape-one" aria-hidden="true"></div>
    <div class="background-shape shape-two" aria-hidden="true"></div>

    <main class="app-shell">
      <header class="app-header">
        <p class="eyebrow">TODAY'S MENU</p>
        <h1>今天吃什么<span aria-hidden="true">？</span></h1>
        <p class="subtitle">选择困难先放一边，让好运替你点餐。</p>
      </header>

      <section class="filter-section" aria-labelledby="filter-title">
        <div class="section-heading">
          <h2 id="filter-title">今天想吃哪一类？</h2>
          <span id="available-count" class="available-count">正在准备菜单...</span>
        </div>
        <div id="filter-list" class="filter-list" role="group" aria-label="菜品分类筛选">
          <button class="filter-chip is-active" type="button" data-category="全部" aria-pressed="true">
            全部
          </button>
          <button class="filter-chip" type="button" data-category="中餐" aria-pressed="false">中餐</button>
          <button class="filter-chip" type="button" data-category="面食" aria-pressed="false">面食</button>
          <button class="filter-chip" type="button" data-category="火锅烧烤" aria-pressed="false">
            火锅烧烤
          </button>
          <button class="filter-chip" type="button" data-category="日料韩餐" aria-pressed="false">
            日料韩餐
          </button>
          <button class="filter-chip" type="button" data-category="西餐快餐" aria-pressed="false">
            西餐快餐
          </button>
          <button class="filter-chip" type="button" data-category="轻食甜品" aria-pressed="false">
            轻食甜品
          </button>
        </div>
      </section>

      <section class="decision-stage" aria-labelledby="food-name">
        <div id="food-card" class="food-card">
          <div class="tape tape-left" aria-hidden="true"></div>
          <div class="tape tape-right" aria-hidden="true"></div>

          <div class="food-visual">
            <div class="spark spark-one" aria-hidden="true">✦</div>
            <div class="spark spark-two" aria-hidden="true">●</div>
            <div id="food-image" class="food-image" role="img" aria-label="等待抽取的餐盘">🍽️</div>
          </div>

          <div class="food-content">
            <div class="food-meta">
              <span id="food-cuisine" class="cuisine-badge">好运菜单</span>
              <span id="food-category" class="category-text">全部分类</span>
            </div>
            <h2 id="food-name">准备好了吗？</h2>
            <div id="food-tags" class="tag-list" aria-label="菜品标签">
              <span class="food-tag">随机</span>
              <span class="food-tag">惊喜</span>
            </div>
            <p id="food-reason" class="food-reason">按下按钮，让今天这一顿变得简单一点。</p>
          </div>
        </div>

        <div class="primary-actions">
          <button id="decide-button" class="button button-primary" type="button" disabled>
            <span class="button-icon" aria-hidden="true">✦</span>
            <span class="button-label">菜单加载中...</span>
          </button>
        </div>

        <div id="result-actions" class="result-actions" hidden>
          <button id="again-button" class="button button-secondary" type="button">
            <span aria-hidden="true">↻</span>
            再来一次
          </button>
          <button id="exclude-button" class="button button-ghost" type="button">
            <span aria-hidden="true">×</span>
            暂时不吃这个
          </button>
        </div>

        <p id="status-message" class="status-message" role="status" aria-live="polite"></p>
      </section>

      <footer class="app-footer">
        <p>认真吃饭，快乐加倍 <span aria-hidden="true">♡</span></p>
        <button id="reset-exclusions" class="text-button" type="button" hidden>
          恢复已跳过的菜品
        </button>
      </footer>
    </main>

    <noscript>请开启 JavaScript 后使用“今天吃什么”。</noscript>
    <script src="js/app.js"></script>
  </body>
</html>
