<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#ff8f70">
    <meta name="application-name" content="今天吃什么">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="今天吃什么">
    <meta name="mobile-web-app-capable" content="yes">
    <meta
      name="description"
      content="不知道今天吃什么？轻轻一点，随机挑选你的下一顿美食。"
    >
    <title>今天吃什么？</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
    <link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png">
    <link rel="stylesheet" href="css/style.css">
  </head>
  <body>
    <div class="background-shape shape-one" aria-hidden="true"></div>
    <div class="background-shape shape-two" aria-hidden="true"></div>
    <div class="floating-foods" aria-hidden="true">
      <span class="floating-food floating-food-one">🍕</span>
      <span class="floating-food floating-food-two">🥟</span>
      <span class="floating-food floating-food-three">🍜</span>
      <span class="floating-food floating-food-four">🍙</span>
      <span class="floating-food floating-food-five">🥐</span>
      <span class="floating-food floating-food-six">🍔</span>
    </div>

    <main class="app-shell">
      <header class="app-header">
        <div class="brand-pill">
          <span aria-hidden="true">✦</span>
          FOOD LUCKY BOX
          <span aria-hidden="true">✦</span>
        </div>
        <h1>今天吃啥<span aria-hidden="true">？</span></h1>
        <p class="subtitle">投下一点好运，抽走今天的美味答案。</p>
      </header>

      <section class="filter-section" aria-labelledby="filter-title">
        <div class="section-heading">
          <h2 id="filter-title"><span aria-hidden="true">🎟️</span> 给今天一点方向</h2>
          <span id="available-count" class="available-count">正在准备菜单...</span>
        </div>
        <div class="filter-stack">
          <div class="filter-row">
            <span class="filter-label">菜系</span>
            <div class="filter-scroll">
              <div id="category-filter" class="filter-list" role="group" aria-label="菜系筛选"></div>
            </div>
          </div>
          <div class="filter-row">
            <span class="filter-label">这顿</span>
            <div class="filter-scroll">
              <div id="meal-filter" class="filter-list" role="group" aria-label="用餐类型筛选">
                <button class="filter-chip is-active" type="button" data-value="全部" aria-pressed="true">都可以</button>
                <button class="filter-chip" type="button" data-value="正餐" aria-pressed="false">正餐</button>
                <button class="filter-chip" type="button" data-value="轻食" aria-pressed="false">轻食</button>
                <button class="filter-chip" type="button" data-value="甜品" aria-pressed="false">甜品</button>
              </div>
            </div>
          </div>
          <div class="filter-row filter-row-compact">
            <span class="filter-label">偏好</span>
            <div class="filter-scroll">
              <div id="preference-filter" class="filter-list" role="group" aria-label="预算和口味筛选">
                <button class="filter-chip is-active" type="button" data-filter="budget" data-value="全部" aria-pressed="true">不限预算</button>
                <button class="filter-chip" type="button" data-filter="budget" data-value="实惠" aria-pressed="false">实惠</button>
                <button class="filter-chip" type="button" data-filter="budget" data-value="品质" aria-pressed="false">品质</button>
                <button class="filter-chip is-active" type="button" data-filter="spice" data-value="全部" aria-pressed="true">不限辣度</button>
                <button class="filter-chip" type="button" data-filter="spice" data-value="不辣" aria-pressed="false">不辣</button>
                <button class="filter-chip" type="button" data-filter="spice" data-value="辣" aria-pressed="false">想吃辣</button>
              </div>
            </div>
          </div>
        </div>
      </section>

      <section class="decision-stage" aria-labelledby="food-name">
        <div class="quick-action">
          <button id="quick-decide-button" class="button button-primary quick-decide-button" type="button" disabled>
            <span aria-hidden="true">✦</span>
            <span>马上帮我选</span>
          </button>
          <p>不想筛也没关系，直接交给好运。</p>
        </div>

        <div class="machine">
          <div class="machine-marquee" aria-hidden="true">
            <span class="marquee-light"></span>
            <span class="marquee-light"></span>
            <span class="marquee-light"></span>
            <strong>今日美食盲盒</strong>
            <span class="marquee-light"></span>
            <span class="marquee-light"></span>
            <span class="marquee-light"></span>
          </div>

          <div class="machine-screen">
            <div class="screen-label">
              <span class="live-dot" aria-hidden="true"></span>
              <span id="draw-stage">等待开奖</span>
            </div>

            <div id="confetti-layer" class="confetti-layer" aria-hidden="true"></div>
            <div id="food-card" class="food-card">
              <div class="food-visual">
                <div class="orbit orbit-one" aria-hidden="true"></div>
                <div class="orbit orbit-two" aria-hidden="true"></div>
                <div class="spark spark-one" aria-hidden="true">✦</div>
                <div class="spark spark-two" aria-hidden="true">✦</div>
                <div id="food-image" class="food-image" role="img" aria-label="等待抽取的餐盘">
                  🍽️
                </div>
              </div>

              <div class="food-content">
                <div class="food-meta">
                  <span id="food-cuisine" class="cuisine-badge">好运菜单</span>
                  <span id="food-category" class="category-text">全部分类</span>
                </div>
                <div class="name-window">
                  <span class="window-glare" aria-hidden="true"></span>
                  <h2 id="food-name">准备好了吗？</h2>
                </div>
                <div id="food-tags" class="tag-list" aria-label="菜品标签">
                  <span class="food-tag">随机</span>
                  <span class="food-tag">惊喜</span>
                </div>
                <p id="food-reason" class="food-reason">按下按钮，让今天这一顿变得简单一点。</p>
              </div>
            </div>
          </div>

          <div class="machine-controls">
            <div class="coin-slot" aria-hidden="true">
              <span></span>
              LUCK
            </div>
            <div class="primary-actions">
              <button id="decide-button" class="button button-primary" type="button" disabled>
                <span class="button-icon" aria-hidden="true">✦</span>
                <span class="button-label">菜单加载中...</span>
              </button>
              <p class="button-hint">点击启动 · 好运开奖</p>
            </div>
            <div class="machine-knob" aria-hidden="true">
              <span></span>
            </div>
          </div>
        </div>

        <div id="result-actions" class="result-actions" hidden>
          <button id="again-button" class="button button-secondary" type="button">
            <span aria-hidden="true">↻</span>
            再来一次
          </button>
          <button id="exclude-button" class="button button-ghost" type="button">
            <span aria-hidden="true">×</span>
            暂时不吃这个
          </button>
          <a id="nearby-link" class="button button-link" href="#" target="_blank" rel="noopener">
            <span aria-hidden="true">⌖</span>
            附近找找
          </a>
          <a id="takeout-link" class="button button-link" href="#" target="_blank" rel="noopener">
            <span aria-hidden="true">↗</span>
            搜索外卖
          </a>
        </div>

        <p id="status-message" class="status-message" role="status" aria-live="polite"></p>
        <button id="undo-exclusion" class="text-button undo-button" type="button" hidden>
          撤销刚才的跳过
        </button>
      </section>

      <footer class="app-footer">
        <p>每次选择，都是一份美味签 <span aria-hidden="true">♡</span></p>
        <button id="reset-exclusions" class="text-button" type="button" hidden>
          恢复已跳过的菜品
        </button>
      </footer>
    </main>

    <noscript>请开启 JavaScript 后使用“今天吃什么”。</noscript>
    <script src="js/food-rules.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
